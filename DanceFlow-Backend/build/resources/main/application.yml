server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/danceflow?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    # At least 32 chars for HS256
    secret: ${JWT_SECRET:change-me-to-a-very-long-random-secret-key-for-danceflow-12345}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

# 文件存储路径
file:
  upload-dir: ${UPLOAD_DIR:./uploads}
